services:
  db:
    image: postgres:15
    container_name: amandate_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-amandate}
      POSTGRES_USER: ${DB_USER:-amandate}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-amandate}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - amandate-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-amandate} -d ${DB_NAME:-amandate}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: amandate_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-amandate}
      DB_USER: ${DB_USER:-amandate}
      DB_PASSWORD: ${DB_PASSWORD:-amandate}
      APP_ENV: ${APP_ENV:-development}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      CHAT_DEEP_LINK_BASE_URL: ${CHAT_DEEP_LINK_BASE_URL:-https://chat.internal/users}
      ENABLE_ADMIN_VIEW: ${ENABLE_ADMIN_VIEW:-false}
      ADMIN_USER_ID: ${ADMIN_USER_ID:-}
    ports:
      - "${API_PORT:-8000}:8000"
    command: ["/bin/bash", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"]
    working_dir: /app
    volumes:
      - ./backend:/app

  tests:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: test
    container_name: amandate_tests
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-amandate}
      DB_USER: ${DB_USER:-amandate}
      DB_PASSWORD: ${DB_PASSWORD:-amandate}
    working_dir: /app

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
        VITE_ENABLE_ADMIN_VIEW: ${VITE_ENABLE_ADMIN_VIEW:-false}
        VITE_ADMIN_USER_ID: ${VITE_ADMIN_USER_ID:-}
    container_name: amandate_frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-5173}:80"

volumes:
  amandate-db-data:

