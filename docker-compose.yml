services:
  db:
    image: postgres:15
    container_name: amandate_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-amandate}
      POSTGRES_USER: ${POSTGRES_USER:-amandate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-amandate}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - amandate-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-amandate} -d ${POSTGRES_DB:-amandate}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: amandate_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-amandate}:${POSTGRES_PASSWORD:-amandate}@db:5432/${POSTGRES_DB:-amandate}
      APP_ENV: ${APP_ENV:-development}
    ports:
      - "${API_PORT:-8000}:8000"
    command: ["/bin/bash", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"]
    working_dir: /app
    volumes:
      - ./backend:/app

  tests:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: test
    container_name: amandate_tests
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-amandate}:${POSTGRES_PASSWORD:-amandate}@db:5432/${POSTGRES_DB:-amandate}
    working_dir: /app

volumes:
  amandate-db-data:

