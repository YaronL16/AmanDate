name: CI

on:
  pull_request:
  push:
    branches:
    - main
    tags:
    - "v*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}
  VERSION_MAJOR: "0"
  VERSION_MINOR: "1"

jobs:
  backend-tests:
    name: Backend tests (docker compose)
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Prebuild cached backend test image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./backend/Dockerfile
        target: test
        tags: amandate-tests:ci
        load: true
        cache-from: type=gha,scope=backend-tests
        cache-to: type=gha,mode=max,scope=backend-tests

    - name: Create compose override for cached test image
      run: |
        cat > docker-compose.ci.yml <<'EOF'
        services:
          tests:
            image: amandate-tests:ci
            pull_policy: never
        EOF

    - name: Run backend tests service with db
      run: docker compose -f docker-compose.yml -f docker-compose.ci.yml up --abort-on-container-exit --exit-code-from tests tests db

    - name: Tear down compose stack
      if: always()
      run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v --remove-orphans

  backend-build-release:
    name: Build and release backend image
    runs-on: ubuntu-latest
    needs: backend-tests
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GHCR
      if: github.event_name == 'push'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract backend image metadata
      id: backend-meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/amandate-backend
        tags: |
          type=sha
          type=raw,value=${{ env.VERSION_MAJOR }}.${{ env.VERSION_MINOR }}.${{ github.run_number }},enable=${{ github.event_name == 'push' && startsWith(github.ref, 'refs/heads/') }}
          type=ref,event=tag
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push backend image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./backend/Dockerfile
        push: ${{ github.event_name == 'push' }}
        tags: ${{ steps.backend-meta.outputs.tags }}
        labels: ${{ steps.backend-meta.outputs.labels }}
        cache-from: type=gha,scope=backend-release
        cache-to: type=gha,mode=max,scope=backend-release

  frontend-lint:
    name: Frontend lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Lint
      run: npm run lint

  frontend-build-release:
    name: Build and release frontend image
    runs-on: ubuntu-latest
    needs: frontend-lint
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GHCR
      if: github.event_name == 'push'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract frontend image metadata
      id: frontend-meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/amandate-frontend
        tags: |
          type=sha
          type=raw,value=${{ env.VERSION_MAJOR }}.${{ env.VERSION_MINOR }}.${{ github.run_number }},enable=${{ github.event_name == 'push' && startsWith(github.ref, 'refs/heads/') }}
          type=ref,event=tag
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push frontend image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./frontend/Dockerfile
        push: ${{ github.event_name == 'push' }}
        tags: ${{ steps.frontend-meta.outputs.tags }}
        labels: ${{ steps.frontend-meta.outputs.labels }}
        cache-from: type=gha,scope=frontend-release
        cache-to: type=gha,mode=max,scope=frontend-release
