name: CI

on:
  pull_request:
  push:
    branches:
    - main

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  VERSION_MAJOR: "0"
  VERSION_MINOR: "1"

jobs:
  version:
    name: Determine release version
    runs-on: ubuntu-latest
    outputs:
      value: ${{ steps.compute.outputs.value }}
      image_namespace: ${{ steps.compute.outputs.image_namespace }}
    steps:
    - name: Compute version from run number
      id: compute
      run: |
        echo "value=${VERSION_MAJOR}.${VERSION_MINOR}.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
        echo "image_namespace=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

  backend-tests:
    name: Backend tests (docker compose)
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Prebuild cached backend test image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./backend/Dockerfile
        target: test
        tags: amandate-tests:ci
        load: true
        cache-from: type=gha,scope=backend-tests
        cache-to: type=gha,mode=max,scope=backend-tests

    - name: Create compose override for cached test image
      run: |
        cat > docker-compose.ci.yml <<'EOF'
        services:
          tests:
            image: amandate-tests:ci
            pull_policy: never
        EOF

    - name: Run backend tests service with db
      run: docker compose -f docker-compose.yml -f docker-compose.ci.yml up --abort-on-container-exit --exit-code-from tests tests db

    - name: Tear down compose stack
      if: always()
      run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v --remove-orphans

  backend-build-release:
    name: Build and release backend image
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
    - backend-tests
    - version
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GHCR
      if: github.event_name == 'push'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push backend image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./backend/Dockerfile
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ needs.version.outputs.image_namespace }}/amandate-backend:${{ needs.version.outputs.value }}
          ${{ env.REGISTRY }}/${{ needs.version.outputs.image_namespace }}/amandate-backend:latest
        cache-from: type=gha,scope=backend-release
        cache-to: type=gha,mode=max,scope=backend-release

  frontend-lint:
    name: Frontend lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Lint
      run: npm run lint

  frontend-build-release:
    name: Build and release frontend image
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
    - frontend-lint
    - version
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GHCR
      if: github.event_name == 'push'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push frontend image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./frontend/Dockerfile
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ needs.version.outputs.image_namespace }}/amandate-frontend:${{ needs.version.outputs.value }}
          ${{ env.REGISTRY }}/${{ needs.version.outputs.image_namespace }}/amandate-frontend:latest
        cache-from: type=gha,scope=frontend-release
        cache-to: type=gha,mode=max,scope=frontend-release

  update-helm-release-metadata:
    name: Update Helm release metadata
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
    - version
    - backend-build-release
    - frontend-build-release
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Update chart values imageTag
      uses: mikefarah/yq@v4.44.6
      env:
        VERSION: ${{ needs.version.outputs.value }}
      with:
        cmd: yq '.global.imageTag = strenv(VERSION)' -i deploy/helm/amandate/values.yaml

    - name: Update chart version and appVersion
      uses: mikefarah/yq@v4.44.6
      env:
        VERSION: ${{ needs.version.outputs.value }}
      with:
        cmd: yq '.version = strenv(VERSION) | .appVersion = strenv(VERSION)' -i deploy/helm/amandate/Chart.yaml

    - name: Commit and push Helm metadata update
      env:
        VERSION: ${{ needs.version.outputs.value }}
      run: |
        if git diff --quiet -- deploy/helm/amandate/values.yaml deploy/helm/amandate/Chart.yaml; then
          echo "Helm metadata already set to $VERSION."
          exit 0
        fi
        git add deploy/helm/amandate/values.yaml deploy/helm/amandate/Chart.yaml
        git -c user.name='github-actions[bot]' -c user.email='github-actions[bot]@users.noreply.github.com' commit -m "chore(release): set helm chart version to $VERSION [skip ci]"
        git push origin HEAD:main

  publish-helm-chart:
    name: Publish Helm chart to GHCR
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
    - version
    - update-helm-release-metadata
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        ref: main

    - name: Set up Helm
      uses: azure/setup-helm@v4

    - name: Login to GHCR for Helm OCI push
      env:
        REGISTRY: ${{ env.REGISTRY }}
      run: |
        echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login "$REGISTRY" -u "${{ github.actor }}" --password-stdin

    - name: Package and publish chart
      env:
        VERSION: ${{ needs.version.outputs.value }}
        IMAGE_NAMESPACE: ${{ needs.version.outputs.image_namespace }}
        REGISTRY: ${{ env.REGISTRY }}
      run: |
        mkdir -p .helm-dist
        helm package deploy/helm/amandate --destination .helm-dist
        helm push ".helm-dist/amandate-${VERSION}.tgz" "oci://${REGISTRY}/${IMAGE_NAMESPACE}/charts"

  create-git-tag:
    name: Create git tag for release version
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
    - version
    - update-helm-release-metadata
    - publish-helm-chart
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: main

    - name: Create and push tag
      env:
        VERSION: ${{ needs.version.outputs.value }}
      run: |
        if git rev-parse "$VERSION" >/dev/null 2>&1; then
          echo "Tag $VERSION already exists, skipping."
          exit 0
        fi
        git tag "$VERSION"
        git push origin "refs/tags/$VERSION"

  create-github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
    - version
    - create-git-tag
    steps:
    - name: Create or update release
      uses: ncipollo/release-action@v1
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        tag: ${{ needs.version.outputs.value }}
        name: Release ${{ needs.version.outputs.value }}
        allowUpdates: true
        generateReleaseNotes: true
        body: |
          ## Container images
          - Backend: ${{ env.REGISTRY }}/${{ needs.version.outputs.image_namespace }}/amandate-backend:${{ needs.version.outputs.value }}
          - Frontend: ${{ env.REGISTRY }}/${{ needs.version.outputs.image_namespace }}/amandate-frontend:${{ needs.version.outputs.value }}
          - Helm chart: oci://${{ env.REGISTRY }}/${{ needs.version.outputs.image_namespace }}/charts/amandate:${{ needs.version.outputs.value }}
