nameOverride: ""
fullnameOverride: ""
commonLabels: {}
global:
  imageRepository: ghcr.io/yaronl16
  imagePullPolicy: IfNotPresent
  imageTag: "0.1.13"
config:
  appEnv: development
  chatDeepLinkBaseUrl: https://chat.internal/users
  enableAdminView: "false"
  adminUserId: ""
# Backend
backend:
  replicaCount: 1
  extraEnv: {}
  resources: {}
# Frontend
frontend:
  replicaCount: 1
  resources: {}
  ingress:
    className: contour
    annotations: {}
    hosts:
    - host: amandate.developers-argocd.branch-yesodot.org
      paths:
      - path: /
        pathType: Prefix
    tls: []
# Vault Secrets
vaultStaticSecret:
  # Requires Vault Secrets Operator + VaultAuth in the target namespace.
  vaultAuthRef: vault-resources/yaron-vaultauth
  mount: kv/developers
  applicationSecret:
    path: yaron/amandate/db-app-secret
  dbAdminSecret:
    path: yaron/amandate/db-admin-secret
# CloudNative PostgreSQL
database:
  name: amandate
  port: 5432
  appUser: amandate
  superuser: postgres
  cnpg:
    clusterName: ""
    instances: 1
    storage:
      size: 5Gi
      storageClass: standard
    resources: {}
    parameters: {}
# App schema migration job
migration:
  hookDeletePolicy: before-hook-creation,hook-succeeded
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  resources: {}
