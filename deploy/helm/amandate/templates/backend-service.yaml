apiVersion: v1
kind: Service
metadata:
  name: {{ include "amandate.backend.fullname" . }}
  labels:
    {{- include "amandate.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    {{- include "amandate.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
