apiVersion: networking.k8s.io/v1
kind: Ingress
{{- $tlsEnabled := and .Values.frontend.ingress.tls .Values.frontend.ingress.tls.clusterIssuerName }}
{{- $annotations := .Values.frontend.ingress.annotations | default dict }}
{{- if $tlsEnabled }}
{{- $annotations = merge $annotations (dict "cert-manager.io/cluster-issuer" .Values.frontend.ingress.tls.clusterIssuerName) }}
{{- end }}
metadata:
  name: {{ include "amandate.frontend.fullname" . }}
  labels:
    {{- include "amandate.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
  annotations:
    {{- toYaml $annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.frontend.ingress.className }}
  rules:
    {{- range .Values.frontend.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "amandate.backend.fullname" $ }}
                port:
                  number: 8000
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "amandate.frontend.fullname" $ }}
                port:
                  number: 80
          {{- end }}
    {{- end }}
  tls:
{{- if $tlsEnabled }}
    - secretName: {{ printf "%s-tls" (include "amandate.frontend.fullname" .) | quote }}
      hosts:
{{- range .Values.frontend.ingress.hosts }}
        - {{ .host | quote }}
{{- end }}
{{- else }}
    []
{{- end }}
