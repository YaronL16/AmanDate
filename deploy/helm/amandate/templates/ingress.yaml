apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "amandate.frontend.fullname" . }}
  labels:
    {{- include "amandate.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
  annotations:
    {{- toYaml .Values.frontend.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.frontend.ingress.className }}
  rules:
    {{- range .Values.frontend.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "amandate.backend.fullname" $ }}
                port:
                  number: 8000
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "amandate.frontend.fullname" $ }}
                port:
                  number: 80
          {{- end }}
    {{- end }}
  tls:
    {{- toYaml .Values.frontend.ingress.tls | nindent 4 }}
