apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: application-secret
  labels:
    {{- include "amandate.labels" . | nindent 4 }}
spec:
  type: kv-v2
  mount: {{ .Values.vaultStaticSecret.mount }}
  path: {{ .Values.vaultStaticSecret.applicationSecret.path }}
  refreshAfter: "30s"
  hmacSecretData: true
  vaultAuthRef: {{ .Values.vaultStaticSecret.vaultAuthRef }}
  destination:
    name: application-secret
    create: true
    overwrite: true
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: db-admin-secret
  labels:
    {{- include "amandate.labels" . | nindent 4 }}
spec:
  type: kv-v2
  mount: {{ .Values.vaultStaticSecret.mount }}
  path: {{ .Values.vaultStaticSecret.dbAdminSecret.path }}
  refreshAfter: "30s"
  hmacSecretData: true
  vaultAuthRef: {{ .Values.vaultStaticSecret.vaultAuthRef }}
  destination:
    name: db-admin-secret
    create: true
    overwrite: true
