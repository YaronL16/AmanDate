apiVersion: v1
kind: Service
metadata:
  name: {{ include "amandate.frontend.fullname" . }}
  labels:
    {{- include "amandate.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    {{- include "amandate.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
