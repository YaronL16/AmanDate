apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "amandate.backend.fullname" . }}
  labels:
    {{- include "amandate.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      {{- include "amandate.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "amandate.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.global.imageRepository }}/amandate-backend:{{ .Values.global.imageTag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          command:
            - /bin/sh
            - -c
          args:
            - uvicorn app.main:app --host 0.0.0.0 --port 8000
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "amandate.configmapName" . }}
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: application-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: application-secret
                  key: password
            - name: DATABASE_URL
              value: postgresql+psycopg2://$(DB_USER):$(DB_PASSWORD)@{{ include "amandate.cnpgRwServiceName" . }}:{{ .Values.database.port }}/{{ .Values.database.name }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
